name: 功能请求
description: 提出一个新功能建议或改进意见
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请详细描述你的需求，帮助我们更好地改进 SilentGuard。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你希望解决什么问题？请描述你遇到的痛点或不便之处
      placeholder: 例如：目前只能通过邮件接收通知，在网络不稳定时容易错过重要短信
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述你期望的解决方案或功能实现方式
      placeholder: 例如：希望增加钉钉/企业微信 Webhook 通知方式，作为邮件通知的备选方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
      placeholder: 例如：也可以考虑增加 Telegram Bot 通知，或本地通知持久化存储
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何有助于理解需求的信息（截图、参考链接等）
    validations:
      required: false
